<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music | Sandor Gavin</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Helvetica, Arial, sans-serif;
    background: #fff;
    color: #000;
}

/* ===== HEADER ===== */
header {
    padding: 20px 0;
    text-align: center;
    position: relative;
}

nav a {
    text-decoration: none;
    color: #000;
    margin: 0 25px;
    font-size: 16px;
    letter-spacing: 2px;
}

nav a:hover,
nav a.active {
    color: #9bd3f5;
}

/* ===== HAMBURGER ===== */
.hamburger {
    display: none;
    position: fixed;
    top: 20px;
    right: 20px;
    width: 40px;
    height: 30px;
    border: none;
    background: none;
    padding: 0;
    cursor: pointer;
    z-index: 9999;
}

.hamburger span {
    display: block;
    width: 100%;
    height: 4px;
    background: #000;
    margin-bottom: 6px;
}

.hamburger span:last-child {
    margin-bottom: 0;
}

/* ===== MAIN MUSIC SECTION ===== */
main {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 80px;
    min-height: 70vh;
}

.music-wrapper {
    width: 60%;
    max-width: 600px;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {

    .hamburger {
        display: block;
    }

    nav {
        display: none;
        flex-direction: column;
        gap: 15px;
        background: rgba(255,255,255,0.95);
        position: absolute;
        top: 60px;
        left: 0;
        width: 100%;
        padding: 15px 0;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    nav.active {
        display: flex;
    }

    main {
        padding-top: 100px;
        padding-left: 20px;
        padding-right: 20px;
    }

    .music-wrapper {
        width: 100%;
    }
}
</style>
</head>

<body>

<header>
    <button id="menu-toggle" class="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <nav id="main-nav">
        <a href="index.html">Home</a>
        <a href="music.html" class="active">Music</a>
        <a href="http://www.youtube.com/sandorgavin" target="_blank">Video</a>
        <a href="https://sandorgavin.bandcamp.com/merch" target="_blank">Shop</a>
        <a href="https://linktr.ee/sandorgavin" target="_blank">Links</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<main>
    <div class="music-wrapper">
        <iframe 
            data-testid="embed-iframe" 
            style="border-radius:12px" 
            src="https://open.spotify.com/embed/artist/3WdYHvFVTB7OeUODdtrSfM?utm_source=generator" 
            width="100%" 
            height="352" 
            frameborder="0" 
            allowfullscreen="" 
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
            loading="lazy">
        </iframe>
    </div>
</main>

<script>
const toggle = document.getElementById('menu-toggle');
const nav = document.getElementById('main-nav');

toggle.addEventListener('click', () => {
    nav.classList.toggle('active');
});
</script>

</body>
</html>
