<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandor Gavin</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #ffffff;
    font-family: Helvetica, Arial, sans-serif;
    color: #000;
}

/* ================= HEADER ================= */
header {
    background: #fff;
    padding: 20px 0;
    text-align: center;
    position: relative;
}

/* Navigation Links */
nav a {
    text-decoration: none;
    color: #000;
    margin: 0 25px;
    font-size: 16px;
    letter-spacing: 2px;
    transition: color 0.3s ease;
}

nav a:hover,
nav a.active {
    color: #9bd3f5;
}

/* ================= HAMBURGER ================= */
.hamburger {
    display: none;
    font-size: 75px;
    background: none;
    border: none;
    cursor: pointer;
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 9999;
}

/* ================= MAIN VIDEO ================= */
main {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 70vh;
}

video {
    width: 60%;
    max-width: 600px;
    height: auto;
    object-fit: contain;
}

/* ================= MOBILE ================= */
@media (max-width: 768px) {

    .hamburger {
        display: block;
    }

    nav {
        display: none;
        flex-direction: column;
        gap: 15px;
        background: rgba(255,255,255,0.95);
        position: absolute;
        top: 60px;
        left: 0;
        width: 100%;
        padding: 15px 0;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    nav.active {
        display: flex;
    }

    main {
        height: 100vh;
    }

    main video {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -53%);
        width: 95%;
        max-height: 95vh;
    }
}
</style>
</head>

<body>

<header>
    <button id="menu-toggle" class="hamburger">&#9776;</button>

    <nav id="main-nav">
        <a href="index.html" class="active">Home</a>
        <a href="http://www.linktr.ee/sandorgavin" target="_blank">Music</a>
        <a href="http://www.youtube.com/sandorgavin" target="_blank">Video</a>
        <a href="https://sandorgavin.bandcamp.com/merch" target="_blank">Shop</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<main>
    <video autoplay muted playsinline>
        <source src="logo.mp4" type="video/mp4">
    </video>
</main>

<script>
const toggle = document.getElementById('menu-toggle');
const nav = document.getElementById('main-nav');

toggle.addEventListener('click', () => {
    nav.classList.toggle('active');
});
</script>

</body>
</html>
