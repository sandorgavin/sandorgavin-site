<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandor Gavin</title>

<style>
/* ============================= */
/* Reset */
/* ============================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* ============================= */
/* Base */
/* ============================= */
body {
    background: #ffffff;
    font-family: Helvetica, Arial, sans-serif;
    color: #000;
}

/* ============================= */
/* Header / Navigation */
/* ============================= */
header {
    background: #fff;
    position: relative;
    padding: 20px 0;
    text-align: center;
    z-index: 100;
}

nav a {
    text-decoration: none;
    color: #000;
    margin: 0 25px;
    font-size: 16px;
    letter-spacing: 2px;
    transition: color 0.3s ease;
}

nav a:hover,
nav a.active {
    color: #9bd3f5;
}

/* ============================= */
/* Hamburger button */
/* ============================= */
.hamburger {
    display: none;
    font-size: 28px;
    background: none;
    border: none;
    cursor: pointer;
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 200;
}

/* ============================= */
/* Main / Video Centering */
/* ============================= */
main {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 70vh;
    position: relative;
    overflow: hidden;
}

video {
    width: 60%;
    max-width: 600px;
    height: auto;
    object-fit: contain;
}

/* ============================= */
/* Mobile Styles / Hamburger & Video */
/* ============================= */
@media (max-width: 768px) {

    main {
        height: 90vh;   /* almost full viewport */
        width: 100%;
        padding: 0;
    }

    main video {
        position: absolute;
        top: 45%;      /* slightly higher on screen */
        left: 50%;
        transform: translate(-50%, -50%);
        width: 95%;    /* almost full width */
        height: auto;
        object-fit: contain;
        z-index: 0;
    }

    .hamburger {
        display: block;
    }

    nav {
        display: none;
        flex-direction: column;
        gap: 15px;
        background: rgba(255,255,255,0.95);
        position: absolute;
        top: 60px;
        left: 0;
        width: 100%;
        padding: 15px 0;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        z-index: 100;
    }

    nav.active {
        display: flex;
    }
}
</style>
</head>

<body>

<header>
    <!-- Hamburger button -->
    <button id="menu-toggle" class="hamburger">☰</button>

    <!-- Navigation -->
    <nav id="main-nav">
        <a href="index.html" class="active">Home</a>
        <a href="http://www.linktr.ee/sandorgavin" target="_blank">Music</a>
        <a href="http://www.youtube.com/sandorgavin" target="_blank">Video</a>
        <a href="https://sandorgavin.bandcamp.com/merch" target="_blank">Shop</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<main>
    <video autoplay muted playsinline>
        <source src="logo.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
</main>

<script>
// Hamburger menu toggle
const toggle = document.getElementById('menu-toggle');
const nav = document.getElementById('main-nav');

toggle.addEventListener('click', () => {
    nav.classList.toggle('active');
});
</script>

</body>
</html>
