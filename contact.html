<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Sandor Gavin</title>

<style>
/* ============================= */
/* RESET */
/* ============================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* ============================= */
/* BASE */
/* ============================= */
body {
    background: #ffffff;
    font-family: Helvetica, Arial, sans-serif;
    color: #000;
}

/* ============================= */
/* HEADER */
/* ============================= */
header {
    background: #fff;
    text-align: center;
    padding: 20px 0;
}

/* ============================= */
/* NAV LINKS */
/* ============================= */
nav a {
    text-decoration: none;
    color: #000;
    margin: 0 25px;
    font-size: 16px;
    letter-spacing: 2px;
    transition: color 0.3s ease;
}

nav a:hover,
nav a.active {
    color: #9bd3f5;
}

/* ============================= */
/* HAMBURGER — LOCKED TO VIEWPORT */
/* ============================= */
.hamburger {
    display: none;
    font-size: 75px;
    background: none;
    border: none;
    cursor: pointer;

    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 9999;
}

/* ============================= */
/* MAIN LAYOUT */
/* ============================= */
main {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 120px;
    min-height: 70vh;
    padding: 80px 20px 40px;
}

.logo img {
    width: 350px;
    height: auto;
    display: block;
}

.form-wrapper {
    width: 320px;
}

form {
    display: flex;
    flex-direction: column;
}

input,
textarea {
    border: none;
    border-bottom: 1px solid #000;
    padding: 10px 0;
    margin-bottom: 30px;
    font-size: 14px;
    background: transparent;
    outline: none;
}

textarea {
    resize: none;
}

button {
    border: 1px solid #000;
    background: transparent;
    padding: 10px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: 0.3s ease;
}

button:hover {
    background: #000;
    color: #fff;
}

#form-status {
    margin-top: 15px;
    font-size: 14px;
}

/* ============================= */
/* RESPONSIVE */
/* ============================= */
@media (max-width: 900px) {
    main {
        flex-direction: column;
        gap: 60px;
        width: 90%;
        margin: 0 auto;
        align-items: center;
    }

    .logo img {
        width: 250px;
    }
}

@media (max-width: 768px) {

    .hamburger {
        display: block;
    }

    nav {
        display: none;
        flex-direction: column;
        gap: 15px;
        background: rgba(255,255,255,0.95);
        position: fixed;
        top: 90px;
        left: 0;
        width: 100%;
        padding: 20px 0;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        z-index: 9000;
    }

    nav.active {
        display: flex;
    }
}
</style>
</head>

<body>

<header>
    <button id="menu-toggle" class="hamburger">&#9776;</button>

    <nav id="main-nav">
        <a href="index.html">Home</a>
        <a href="http://www.linktr.ee/sandorgavin" target="_blank">Music</a>
        <a href="http://www.youtube.com/sandorgavin" target="_blank">Video</a>
        <a href="https://sandorgavin.bandcamp.com/merch" target="_blank">Shop</a>
        <a href="contact.html" class="active">Contact</a>
    </nav>
</header>

<main>
    <div class="logo">
        <img src="logo.png" alt="Sandor Gavin Logo">
    </div>

    <div class="form-wrapper">
        <form id="contact-form" action="https://formspree.io/f/xjgeqoll" method="POST">
            <input type="text" name="name" placeholder="Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <textarea name="message" placeholder="Message" rows="5" required></textarea>
            <button type="submit">SEND</button>
            <p id="form-status"></p>
        </form>
    </div>
</main>

<script>
// Hamburger toggle
const toggle = document.getElementById('menu-toggle');
const nav = document.getElementById('main-nav');

toggle.addEventListener('click', () => {
    nav.classList.toggle('active');
});

// Formspree submission
const form = document.getElementById("contact-form");
const status = document.getElementById("form-status");

form.addEventListener("submit", async function(e) {
    e.preventDefault();
    const data = new FormData(form);

    try {
        const response = await fetch(form.action, {
            method: form.method,
            body: data,
            headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
            status.textContent = "Thank you for your message.";
            form.reset();
        } else {
            status.textContent = "There was a problem sending your message.";
        }
    } catch (error) {
        status.textContent = "There was a problem sending your message.";
    }
});
</script>

</body>
</html>
