<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Sandor Gavin</title>

<style>
/* ============================= */
/* Reset */
/* ============================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* ============================= */
/* Base */
/* ============================= */
body {
    background: #ffffff;
    font-family: Helvetica, Arial, sans-serif;
    color: #000;
}

/* ============================= */
/* Header */
/* ============================= */
header {
    text-align: center;
    padding: 30px 0;
}

nav a {
    text-decoration: none;
    color: #000;
    margin: 0 25px;
    font-size: 16px;
    letter-spacing: 2px;
    transition: color 0.3s ease;
}

nav a:hover,
nav a.active {
    color: #9bd3f5;
}

/* ============================= */
/* Contact Layout */
/* ============================= */
main {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 70vh;
    gap: 120px;
}

/* Left Logo */
.logo img {
    width: 350px;
    height: auto;
    display: block;
}

/* Right Form */
.form-wrapper {
    width: 320px;
}

form {
    display: flex;
    flex-direction: column;
}

input,
textarea {
    border: none;
    border-bottom: 1px solid #000;
    padding: 10px 0;
    margin-bottom: 30px;
    font-size: 14px;
    font-family: Helvetica, Arial, sans-serif;
    background: transparent;
    outline: none;
}

textarea {
    resize: none;
}

button {
    border: 1px solid #000;
    background: transparent;
    padding: 10px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: 0.3s ease;
}

button:hover {
    background: #000;
    color: #fff;
}

#form-status {
    margin-top: 15px;
    font-size: 14px;
}

/* ============================= */
/* Responsive */
/* ============================= */
@media (max-width: 900px) {
    main {
        flex-direction: column;
        gap: 60px;
        height: auto;
        padding: 40px 0;
    }

    .logo img {
        width: 250px;
    }
}
</style>
</head>

<body>

<header>
    <nav>
        <a href="index.html">Home</a>
        <a href="http://www.linktr.ee/sandorgavin" target="_blank">Music</a>
        <a href="http://www.youtube.com/sandorgavin" target="_blank">Video</a>
        <a href="https://sandorgavin.bandcamp.com/merch" target="_blank">Shop</a>
        <a href="contact.html" class="active">Contact</a>
    </nav>
</header>

<main>

    <div class="logo">
        <img src="logo.png" alt="Sandor Gavin Logo">
    </div>

    <div class="form-wrapper">

        <form id="contact-form" action="https://formspree.io/f/xjgeqoll" method="POST">

            <input type="text" name="name" placeholder="Name" required>

            <input type="email" name="email" placeholder="Email" required>

            <textarea name="message" placeholder="Message" rows="5" required></textarea>

            <button type="submit">SEND</button>

            <p id="form-status"></p>

        </form>

    </div>

</main>

<script>
const form = document.getElementById("contact-form");
const status = document.getElementById("form-status");

form.addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = new FormData(form);

    try {
        const response = await fetch(form.action, {
            method: form.method,
            body: data,
            headers: {
                'Accept': 'application/json'
            }
        });

        if (response.ok) {
            status.textContent = "Thank you for your message.";
            form.reset();
        } else {
            status.textContent = "There was a problem sending your message.";
        }
    } catch (error) {
        status.textContent = "There was a problem sending your message.";
    }
});
</script>

</body>
</html>
