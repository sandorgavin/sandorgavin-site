<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Sandor Gavin</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #fff;
    font-family: Helvetica, Arial, sans-serif;
    color: #000;
}

/* ================= HEADER ================= */
header {
    background: #fff;
    padding: 20px 0;
    text-align: center;
    position: relative;
    z-index: 10;
}

nav a {
    text-decoration: none;
    color: #000;
    margin: 0 25px;
    font-size: 16px;
    letter-spacing: 2px;
}

nav a.active,
nav a:hover {
    color: #9bd3f5;
}

/* ================= HAMBURGER ================= */
.hamburger {
    display: none;
    font-size: 75px;
    background: none;
    border: none;
    padding: 0;        /* ADD THIS */
    margin: 0;         /* ADD THIS */
    line-height: 1;    /* ADD THIS */
    cursor: pointer;
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 9999;
}

/* ================= CONTACT LAYOUT ================= */
main {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 120px;
    min-height: 70vh;
    padding: 80px 20px 40px;
}

.logo img {
    width: 350px;
}

.form-wrapper {
    width: 320px;
}

form {
    display: flex;
    flex-direction: column;
}

input,
textarea {
    border: none;
    border-bottom: 1px solid #000;
    padding: 10px 0;
    margin-bottom: 30px;
    font-size: 14px;
    background: transparent;
    outline: none;
}

textarea {
    resize: none;
}

button {
    border: 1px solid #000;
    background: transparent;
    padding: 10px;
    letter-spacing: 2px;
    cursor: pointer;
}

button:hover {
    background: #000;
    color: #fff;
}

/* ================= MOBILE ================= */
@media (max-width: 768px) {

    .hamburger {
        display: block;
    }

    nav {
        display: none;
        flex-direction: column;
        gap: 15px;
        background: rgba(255,255,255,0.95);
        position: absolute;
        top: 60px;
        left: 0;
        width: 100%;
        padding: 15px 0;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        z-index: 5;
    }

    nav.active {
        display: flex;
    }

    main {
        flex-direction: column;
        gap: 60px;
        align-items: center;
    }

    .logo img {
        width: 250px;
    }
}
</style>
</head>

<body>

<header>
    <button id="menu-toggle" class="hamburger">&#9776;</button>

    <nav id="main-nav">
        <a href="index.html">Home</a>
        <a href="http://www.linktr.ee/sandorgavin" target="_blank">Music</a>
        <a href="http://www.youtube.com/sandorgavin" target="_blank">Video</a>
        <a href="https://sandorgavin.bandcamp.com/merch" target="_blank">Shop</a>
        <a href="contact.html" class="active">Contact</a>
    </nav>
</header>

<main>
    <div class="logo">
        <img src="logo.png" alt="Sandor Gavin Logo">
    </div>

    <div class="form-wrapper">
        <form action="https://formspree.io/f/xjgeqoll" method="POST">
            <input type="text" name="name" placeholder="Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <textarea name="message" placeholder="Message" rows="5" required></textarea>
            <button type="submit">SEND</button>
        </form>
    </div>
</main>

<script>
const toggle = document.getElementById('menu-toggle');
const nav = document.getElementById('main-nav');

toggle.addEventListener('click', () => {
    nav.classList.toggle('active');
});
</script>

</body>
</html>
